appId: app.boxb
productName: BoxB
directories:
  output: release
  buildResources: resources
files:
  - out/**
  - resources/tray/**
  - package.json
asar: true
publish:
  provider: github
  owner: baalidxb
  repo: boxb
  releaseType: release
win:
  target: nsis
  icon: resources/icon.png
mac:
  target: dmg
  icon: resources/icon.png
  category: public.app-category.social-networking
linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Network
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Force dashed filename so the on-disk artifact matches the URL
  # electron-builder writes into latest.yml. Without this, the file is
  # "BoxB Setup X.Y.Z.exe" but the manifest URL is "BoxB-Setup-X.Y.Z.exe",
  # which would 404 on download.
  artifactName: ${productName}-Setup-${version}.${ext}
